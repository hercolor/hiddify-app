---
name: BflyVPN Bug 反馈
description: 反馈 BflyVPN 客户端问题
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请提交可复现、已脱敏的问题报告。不要粘贴完整 token、authData、订阅地址、节点密码、服务器真实地址或用户隐私数据。

        本模板用于 BflyVPN 二次开发客户端，不再指向旧上游社区或下载入口。
  - type: checkboxes
    id: confirm-scope
    attributes:
      label: 提交前确认
      options:
        - label: 我确认日志和截图已脱敏，没有包含 token、订阅地址、节点密码或服务器真实地址
          required: true
        - label: 我确认这是 BflyVPN 客户端问题，不是旧上游通用客户端问题
          required: true
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      description: 问题出现在哪个平台？
      multiple: true
      options:
        - Android
        - Windows
        - iOS
        - macOS
        - 后端/API
        - 打包/发布
        - 内部核心运行时
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 客户端版本
      description: 例如 pubspec.yaml 中的 4.1.2+40102，或安装包显示版本。
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 系统版本
      description: 例如 Android 14、Windows 11 23H2、iOS 17。
    validations:
      required: true
  - type: dropdown
    id: account-state
    attributes:
      label: 账号/会员状态
      multiple: false
      options:
        - 未登录
        - 普通用户
        - 会员有效
        - 会员到期
        - 流量耗尽
        - 不确定
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 实际问题
      description: 说明实际看到的现象、错误提示、影响范围。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开客户端
        2. 使用 ... 登录
        3. 点击 ...
        4. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 脱敏日志/截图
      description: 只粘贴脱敏后的关键日志。不要粘贴完整 token、订阅 URL、节点地址、密码。
    validations:
      required: false
